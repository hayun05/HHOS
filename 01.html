<!DOCTYPE html>
<html>
    <body style="background-image: url('https://assets.bonappetit.com/photos/5fd134d5e4009dfec306c19f/16:9/w_2560%2Cc_limit/Basically-Lemon.jpg'); background-size: cover; background-size: cover;-family: Arial, sans-serif; text-align: center;">
        <div style="position: absolute; top: 50%; left:50%; transform: translate(-50%, -50%); padding: 16px; border: solid; width: 300px; border-radius: 16px;">
            <h1 style="color: #000000;">HHOS!</h1>
            <p style="color: #555;">This is a simple HTML page.</p>
        </div>

        # 상단 바
        <div
         style="position: absolute; width: 100%; display: flex; backdrop-filter: blur(10px);
          background-color: rgba(0, 0, 0, 0.25); color: #000000; justify-content: space-between;
           align-items: center; padding: 8px 16px; box-sizing: border-box; top: 0;">
            <p
            style="margin-left: 16px; font-weight: 700; background-color:
             rgba(256, 256, 256, 0.125); padding: 4px 12px; border-radius: 16px;">
            HHOS
            </p>

            <button style="background-color: #fff200; color: #000000;
             border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700;">
                click me to START!
            </button>

            <p
            id="timeElement"
            style="margin-right: 16px; font-weight: 700; background-color:
             rgba(256, 256, 256, 0.125); padding: 4px 12px; border-radius: 16px;">
             Time
            </p>

        </div>

        # 하단 바
        <div
        style="position: absolute; width: 100%; display: flex; backdrop-filter: blur(10px);
          background-color: rgba(0, 0, 0, 0.25); color: #000000; justify-content: center;
           align-items: center; padding: 8px 16px; box-sizing: border-box; bottom: 0;">
            <p style="margin: 0;">This is a footer.</p>

        </div>
        
        <div>
            <img src="https://cdn.dribbble.com/userupload/42168942/file/original-b969581595e0d32050577f4f17762767.gif"
             alt="lemon GIF" width = "300" height = "200"
              style="position: absolute; bottom: 50%; left: 16px; border-radius: 16px;">
        </div>

        <script>
            function updateTime(){
                var currentTime = new Date().toLocaleString();
                var timeText = document.getElementById("timeElement");
                timeText.innerHTML = currentTime;
            }
            setInterval(updateTime, 1000);
          
        </script>
    </body>
</html>
